<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🀄 麻將計分板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
 font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;
 background:#1a1a2e;color:#eee;min-height:100vh;padding:16px
}
.card{
 background:#16213e;border-radius:16px;padding:20px;margin-bottom:16px;
 border:1px solid #0f3460
}
.title{font-size:24px;font-weight:bold;text-align:center;margin-bottom:20px}
.title span{color:#e94560}

/* 登入 */
.login{display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;min-height:80vh}
.login input{
 width:100%;max-width:300px;padding:14px;border-radius:12px;border:2px solid #0f3460;
 background:#1a1a2e;color:#fff;font-size:18px;text-align:center
}
.login input:focus{outline:none;border-color:#e94560}
.login button{
 width:100%;max-width:300px;padding:14px;border-radius:12px;border:none;
 background:linear-gradient(135deg,#e94560,#0f3460);color:#fff;font-size:18px;font-weight:bold;cursor:pointer
}

/* 主畫面 */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header .name{font-size:18px;font-weight:bold}
.header .date{font-size:14px;color:#888}
.logout{background:#333;border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer}

/* 分數輸入 - 簡化版 */
.quick-btns{
 display:flex;gap:12px;margin-bottom:12px
}
.quick-btn{
 flex:1;padding:20px;border-radius:12px;border:2px solid;
 font-size:20px;font-weight:bold;cursor:pointer;text-align:center
}
.quick-btn.win{
 background:rgba(74,222,128,0.2);border-color:#4ade80;color:#4ade80
}
.quick-btn.win.active{
 background:#4ade80;color:#000
}
.quick-btn.lose{
 background:rgba(248,113,113,0.2);border-color:#f87171;color:#f87171
}
.quick-btn.lose.active{
 background:#f87171;color:#fff
}
.score-input{
 display:flex;gap:10px;margin-bottom:16px
}
.score-input input{
 flex:1;padding:16px;border-radius:12px;border:2px solid #0f3460;
 background:#1a1a2e;color:#fff;font-size:24px;text-align:center;font-weight:bold
}
.score-input button{
 padding:16px 20px;border-radius:12px;border:none;
 background:#e94560;color:#fff;font-size:16px;font-weight:bold;cursor:pointer
}

/* 我的分數 */
.my-score{
 text-align:center;padding:20px;
 background:linear-gradient(135deg,#0f3460,#16213e);border-radius:16px;margin-bottom:16px
}
.my-score .label{font-size:14px;color:#888;margin-bottom:8px}
.my-score .amount{font-size:48px;font-weight:bold}
.my-score .amount.win{color:#4ade80}
.my-score .amount.lose{color:#f87171}
.my-score .hint{font-size:12px;color:#666;margin-top:8px}

/* 排行榜 */
.leaderboard{}
.leaderboard .title{font-size:16px;color:#888;text-align:left;margin-bottom:12px}
.row{
 display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;
 margin-bottom:8px;background:#16213e
}
.row.highlight{border:2px solid #e94560}
.row .rank{
 width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
 justify-content:center;font-weight:bold;font-size:14px
}
.row .rank.gold{background:linear-gradient(135deg,#ffd700,#ff8c00)}
.row .rank.silver{background:linear-gradient(135deg,#c0c0c0,#888)}
.row .rank.bronze{background:linear-gradient(135deg,#cd7f32,#8b4513)}
.row .rank.normal{background:#333;color:#888}
.row .name{flex:1;font-size:16px;font-weight:bold}
.row .score{font-size:18px;font-weight:bold}
.row .score.win{color:#4ade80}
.row .score.lose{color:#f87171}

/* 統計 */
.stats{background:#0f3460;border-radius:12px;padding:12px;margin-bottom:16px}
.stats-row{display:flex;justify-content:space-around;text-align:center}
.stats-item{padding:8px}
.stats-item .val{font-size:24px;font-weight:bold;color:#e94560}
.stats-item .lbl{font-size:12px;color:#888}

/* 換人 */
.switch-btn{
 background:#16213e;border:1px solid #0f3460;color:#888;
 padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px
}
.switch-btn:hover{background:#0f3460}

/* 提示 */
.tip{font-size:12px;color:#666;text-align:center;margin-top:16px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const ROOM = 'default';

// ========== 本地存儲 ==========
function getStorage(key) {
  try {
    return JSON.parse(localStorage.getItem(key) || '{}');
  } catch { return {}; }
}
function setStorage(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

// ========== 登入畫面 ==========
function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div class="login">
   <div class="title">🀄 麻將計分板</div>
   <input type="text" id="nameInput" placeholder="輸入你的名字（最多8字）" maxlength="8">
   <button onclick="doLogin()">進入牌桌</button>
  </div>`;
  document.getElementById('nameInput').focus();
}

function doLogin() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return alert('請輸入名字');
  if (name.length > 8) return alert('名字最多8個字');
  myName = name;
  setStorage('mahjong_name', name);
  today = new Date().toISOString().split('T')[0];
  renderMain();
}

// ========== 主畫面 ==========
function renderMain() {
  const todayScores = getTodayScores();
  const myScore = todayScores[myName] || 0;
  const scoreClass = myScore > 0 ? 'win' : myScore < 0 ? 'lose' : '';
  const scoreDisplay = myScore > 0 ? '+$' + myScore : myScore < 0 ? '-$' + Math.abs(myScore) : '$0';

  const rows = Object.entries(todayScores)
    .sort((a, b) => b[1] - a[1])
    .map(([name, score], i) => {
      const cls = score > 0 ? 'win' : score < 0 ? 'lose' : '';
      const sign = score > 0 ? '+' : score < 0 ? '-' : '';
      const abs = Math.abs(score);
      const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
      return `<div class="row ${name === myName ? 'highlight' : ''}">
       <div class="rank ${rankClass}">${i + 1}</div>
       <div class="name">${name}</div>
       <div class="score ${cls}">${sign}$${abs}</div>
      </div>`;
    }).join('');

  const stats = calcStats();

  document.getElementById('app').innerHTML = `
  <div class="header">
   <div>
    <div class="name">👤 ${myName}</div>
    <div class="date">📅 ${today}</div>
   </div>
   <button class="switch-btn" onclick="doSwitch()">換人</button>
  </div>

  <div class="my-score">
   <div class="label">我今日的輸贏</div>
   <div class="amount ${scoreClass}">${scoreDisplay}</div>
  </div>

  <div class="quick-btns">
   <button type="button" class="quick-btn win active" id="btnWin" onclick="setMode('win')">贏 💰</button>
   <button type="button" class="quick-btn lose" id="btnLose" onclick="setMode('lose')">輸 💸</button>
  </div>

  <div class="score-input">
   <input type="number" id="scoreInput" placeholder="輸入金額">
   <button onclick="saveScoreLocal()">儲存</button>
  </div>

  <div class="stats">
   <div class="stats-row">
    <div class="stats-item"><div class="val">${stats.games}</div><div class="lbl">局數</div></div>
    <div class="stats-item"><div class="val">${stats.wins}</div><div class="lbl">勝場</div></div>
    <div class="stats-item"><div class="val">${stats.losses}</div><div class="lbl">敗場</div></div>
    <div class="stats-item"><div class="val">${stats.totalScore}</div><div class="lbl">總計</div></div>
   </div>
  </div>

  <div class="leaderboard">
   <div class="title">📊 今日排行榜</div>
   ${rows || '<div style="text-align:center;color:#666;padding:20px">還沒有記錄</div>'}
  </div>

  <div class="tip">💡 贏錢點綠色「贏」再輸入金額｜輸錢點紅色「輸」再輸入金額</div>
  `;
}

function getTodayScores() {
  const key = 'mahjong_scores_' + today;
  return getStorage(key);
}

function saveScoreLocal() {
  const inputVal = document.getElementById('scoreInput').value.trim();
  let val = parseInt(inputVal) || 0;
  if (!isWin && val > 0) val = -val;
  if (val === 0) return;

  const scores = getTodayScores();
  scores[myName] = (scores[myName] || 0) + val;
  setStorage('mahjong_scores_' + today, scores);

  // 記錄歷史
  const history = getStorage('mahjong_history') || [];
  history.push({ name: myName, score: val, date: today, time: new Date().toLocaleTimeString() });
  setStorage('mahjong_history', history.slice(-100));

  document.getElementById('scoreInput').value = '';
  renderMain();
}

function calcStats() {
  const history = (getStorage('mahjong_history') || []).filter(h => h.name === myName);
  const wins = history.filter(h => h.score > 0).length;
  const losses = history.filter(h => h.score < 0).length;
  const totalScore = history.reduce((sum, h) => sum + h.score, 0);
  const games = wins + losses;
  return { games, wins, losses, totalScore };
}

let isWin = true;
function setMode(mode) {
  isWin = (mode === 'win');
  const btnWin = document.getElementById('btnWin');
  const btnLose = document.getElementById('btnLose');
  if (isWin) {
    btnWin.classList.add('active');
    btnLose.classList.remove('active');
  } else {
    btnWin.classList.remove('active');
    btnLose.classList.add('active');
  }
}

function doSwitch() {
  myName = '';
  setStorage('mahjong_name', '');
  renderLogin();
}

// ========== 啟動 ==========
let myName = getStorage('mahjong_name') || '';
let today = new Date().toISOString().split('T')[0];

if (myName) {
  renderMain();
} else {
  renderLogin();
}
</script>
</body>
</html>
